Screens:
  CreateEntity:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - RootContainer:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 247, 1)
            Height: =Parent.Height
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutOverflowY: =LayoutOverflow.Scroll
            PaddingTop: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
          Children:
            - HeaderContainer:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =Auto
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  BorderThickness: =1
                  BorderColor: =RGBA(200, 200, 200, 1)
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  PaddingTop: =24
                  PaddingBottom: =24
                  PaddingLeft: =24
                  PaddingRight: =24
                Children:
                  - HeaderTitle:
                      Control: Text
                      Properties:
                        Text: ="Create New Entity"
                        Size: =28
                        FontWeight: =FontWeight.Bold
                        Color: =RGBA(51, 51, 51, 1)

                  - HeaderSubtitle:
                      Control: Text
                      Properties:
                        Text: ="Fill in the details below to create a new entity"
                        Size: =14
                        FontWeight: =FontWeight.Normal
                        Color: =RGBA(102, 102, 102, 1)

            - FormContainer:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =1
                  Height: =Auto
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =16
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  BorderThickness: =1
                  BorderColor: =RGBA(200, 200, 200, 1)
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  PaddingTop: =24
                  PaddingBottom: =24
                  PaddingLeft: =24
                  PaddingRight: =24
                  LayoutOverflowY: =LayoutOverflow.Scroll
                Children:
                  - EntityTypeField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                      Children:
                        - EntityTypeLabel:
                            Control: Text
                            Properties:
                              Text: ="Entity Type *"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)

                        - EntityTypeDropdown:
                            Control: ComboBox
                            Properties:
                              Items: =[{Value: "User", Display: "User"}, {Value: "Account", Display: "Account"}, {Value: "Contact", Display: "Contact"}, {Value: "Resource", Display: "Bookable Resource"}]
                              Default: ="User"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              Height: =36
                              FillPortions: =1

                  - NameField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                      Children:
                        - NameLabel:
                            Control: Text
                            Properties:
                              Text: ="Name/Title *"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)

                        - NameInput:
                            Control: TextInput
                            Properties:
                              Placeholder: ="Enter name or title"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              Height: =36
                              FillPortions: =1

                  - OwnerField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                      Children:
                        - OwnerLabel:
                            Control: Text
                            Properties:
                              Text: ="Owner *"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)

                        - OwnerDropdown:
                            Control: ComboBox
                            Properties:
                              Items: =[{Value: "admin@contoso.com", Display: "Admin Account"}, {Value: "manager@contoso.com", Display: "Manager Account"}, {Value: "user@contoso.com", Display: "User Account"}]
                              Default: ="admin@contoso.com"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              Height: =36
                              FillPortions: =1

                  - StatusField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                      Children:
                        - StatusLabel:
                            Control: Text
                            Properties:
                              Text: ="Status *"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)

                        - StatusDropdown:
                            Control: ComboBox
                            Properties:
                              Items: =[{Value: "Active", Display: "Active"}, {Value: "Inactive", Display: "Inactive"}, {Value: "Suspended", Display: "Suspended"}]
                              Default: ="Active"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              Height: =36
                              FillPortions: =1

                  - AccessLevelField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                      Children:
                        - AccessLevelLabel:
                            Control: Text
                            Properties:
                              Text: ="Access Level"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)

                        - AccessLevelDropdown:
                            Control: ComboBox
                            Properties:
                              Items: =[{Value: "Basic", Display: "Basic"}, {Value: "Standard", Display: "Standard"}, {Value: "Advanced", Display: "Advanced"}, {Value: "Administrative", Display: "Administrative"}]
                              Default: ="Standard"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              Height: =36
                              FillPortions: =1

                  - DescriptionField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                      Children:
                        - DescriptionLabel:
                            Control: Text
                            Properties:
                              Text: ="Description"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)

                        - DescriptionInput:
                            Control: TextInput
                            Properties:
                              Placeholder: ="Enter optional description"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              Height: =80
                              FillPortions: =1
                              Mode: MultiLine

                  - ValidationMessagesContainer:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 248, 248, 1)
                        FillPortions: =0
                        Height: =Auto
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        BorderThickness: =1
                        BorderColor: =RGBA(244, 67, 54, 1)
                        RadiusTopLeft: =4
                        RadiusTopRight: =4
                        RadiusBottomLeft: =4
                        RadiusBottomRight: =4
                        PaddingTop: =12
                        PaddingBottom: =12
                        PaddingLeft: =12
                        PaddingRight: =12
                      Children:
                        - ValidationErrorMessage:
                            Control: Text
                            Properties:
                              Text: ="* Required fields must be completed before creating"
                              Size: =11
                              FontWeight: =FontWeight.Normal
                              Color: =RGBA(244, 67, 54, 1)

            - ActionButtonBar:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =Transparent
                  FillPortions: =0
                  Height: =50
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =12
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                Children:
                  - CreateButton:
                      Control: Button
                      Properties:
                        Text: ="Create Entity"
                        Fill: =RGBA(34, 177, 76, 1)
                        Color: =RGBA(255, 255, 255, 1)
                        BorderRadius: =4
                        FontWeight: =FontWeight.Semibold
                        Width: =140
                        OnSelect: =Notify("Entity created successfully!", NotificationType.Success)

                  - CancelButton:
                      Control: Button
                      Properties:
                        Text: ="Cancel"
                        Fill: =RGBA(158, 158, 158, 1)
                        Color: =RGBA(255, 255, 255, 1)
                        BorderRadius: =4
                        FontWeight: =FontWeight.Semibold
                        Width: =100
                        OnSelect: =Back()

                  - ResetButton:
                      Control: Button
                      Properties:
                        Text: ="Reset Form"
                        Fill: =RGBA(102, 102, 102, 1)
                        Color: =RGBA(255, 255, 255, 1)
                        BorderRadius: =4
                        FontWeight: =FontWeight.Semibold
                        Width: =120
                        OnSelect: =Notify("Form reset", NotificationType.Information)
