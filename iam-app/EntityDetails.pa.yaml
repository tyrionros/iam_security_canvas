Screens:
  EntityDetails:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - RootContainer:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 247, 1)
            Height: =Parent.Height
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutOverflowY: =LayoutOverflow.Scroll
            PaddingTop: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
          Children:
            - HeaderContainer:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =80
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  BorderThickness: =1
                  BorderColor: =RGBA(200, 200, 200, 1)
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  PaddingLeft: =24
                  PaddingRight: =24
                Children:
                  - BackButton:
                      Control: Button
                      Properties:
                        Text: ="← Back"
                        Fill: =RGBA(158, 158, 158, 1)
                        Color: =RGBA(255, 255, 255, 1)
                        FontWeight: =FontWeight.Semibold
                        Width: =100
                        OnSelect: =Back()

                  - EntityTitleSection:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                      Children:
                        - EntityName:
                            Control: Text
                            Properties:
                              Text: ="Alice Johnson"
                              Size: =24
                              FontWeight: =FontWeight.Bold
                              Color: =RGBA(51, 51, 51, 1)

                        - EntityType:
                            Control: Text
                            Properties:
                              Text: ="User Account"
                              Size: =12
                              FontWeight: =FontWeight.Normal
                              Color: =RGBA(102, 102, 102, 1)

                  - StatusBadge:
                      Control: Button
                      Properties:
                        Text: ="Active"
                        Fill: =RGBA(34, 177, 76, 1)
                        Color: =RGBA(255, 255, 255, 1)
                        FontWeight: =FontWeight.Bold
                        Width: =100
                        Disabled: =true

            - FormContainer:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =1
                  Height: =400
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =16
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  BorderThickness: =1
                  BorderColor: =RGBA(200, 200, 200, 1)
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  PaddingTop: =24
                  PaddingBottom: =24
                  PaddingLeft: =24
                  PaddingRight: =24
                  LayoutOverflowY: =LayoutOverflow.Scroll
                Children:
                  - FormTitle:
                      Control: Text
                      Properties:
                        Text: ="Entity Details"
                        Size: =18
                        FontWeight: =FontWeight.Bold
                        Color: =RGBA(51, 51, 51, 1)

                  - IDField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutAlignItems: =LayoutAlignItems.Center
                      Children:
                        - IDLabel:
                            Control: Text
                            Properties:
                              Text: ="ID:"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)
                              FillPortions: =0
                              Width: =100

                        - IDValue:
                            Control: Text
                            Properties:
                              Text: ="U001"
                              Size: =12
                              FontWeight: =FontWeight.Normal
                              Color: =RGBA(102, 102, 102, 1)

                  - NameField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutAlignItems: =LayoutAlignItems.Center
                      Children:
                        - NameLabel:
                            Control: Text
                            Properties:
                              Text: ="Name:"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)
                              FillPortions: =0
                              Width: =100

                        - NameValue:
                            Control: TextInput
                            Properties:
                              Text: ="Alice Johnson"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              FillPortions: =1

                  - StatusField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutAlignItems: =LayoutAlignItems.Center
                      Children:
                        - StatusLabel:
                            Control: Text
                            Properties:
                              Text: ="Status:"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)
                              FillPortions: =0
                              Width: =100

                        - StatusDropdown:
                            Control: ComboBox
                            Properties:
                              Items: =[{Value: "Active", Display: "Active"}, {Value: "Inactive", Display: "Inactive"}, {Value: "Suspended", Display: "Suspended"}]
                              Default: ="Active"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              FillPortions: =1

                  - OwnerField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutAlignItems: =LayoutAlignItems.Center
                      Children:
                        - OwnerLabel:
                            Control: Text
                            Properties:
                              Text: ="Owner:"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)
                              FillPortions: =0
                              Width: =100

                        - OwnerValue:
                            Control: TextInput
                            Properties:
                              Text: ="admin@contoso.com"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              FillPortions: =1

                  - AccessLevelField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutAlignItems: =LayoutAlignItems.Center
                      Children:
                        - AccessLevelLabel:
                            Control: Text
                            Properties:
                              Text: ="Access Level:"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)
                              FillPortions: =0
                              Width: =100

                        - AccessLevelDropdown:
                            Control: ComboBox
                            Properties:
                              Items: =[{Value: "Basic", Display: "Basic"}, {Value: "Standard", Display: "Standard"}, {Value: "Advanced", Display: "Advanced"}, {Value: "Administrative", Display: "Administrative"}]
                              Default: ="Administrative"
                              Fill: =RGBA(245, 245, 247, 1)
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              FillPortions: =1

                  - CreatedField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutAlignItems: =LayoutAlignItems.Center
                      Children:
                        - CreatedLabel:
                            Control: Text
                            Properties:
                              Text: ="Created:"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)
                              FillPortions: =0
                              Width: =100

                        - CreatedValue:
                            Control: Text
                            Properties:
                              Text: ="Mar 15, 2024"
                              Size: =12
                              FontWeight: =FontWeight.Normal
                              Color: =RGBA(102, 102, 102, 1)

                  - LastModifiedField:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =Transparent
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutAlignItems: =LayoutAlignItems.Center
                      Children:
                        - LastModifiedLabel:
                            Control: Text
                            Properties:
                              Text: ="Last Modified:"
                              Size: =12
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)
                              FillPortions: =0
                              Width: =100

                        - LastModifiedValue:
                            Control: Text
                            Properties:
                              Text: ="Today at 2:30 PM"
                              Size: =12
                              FontWeight: =FontWeight.Normal
                              Color: =RGBA(102, 102, 102, 1)

            - AuditSection:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =200
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =12
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  BorderThickness: =1
                  BorderColor: =RGBA(200, 200, 200, 1)
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  PaddingTop: =20
                  PaddingBottom: =20
                  PaddingLeft: =20
                  PaddingRight: =20
                  LayoutOverflowY: =LayoutOverflow.Scroll
                Children:
                  - AuditTitle:
                      Control: Text
                      Properties:
                        Text: ="Audit Trail"
                        Size: =14
                        FontWeight: =FontWeight.Bold
                        Color: =RGBA(51, 51, 51, 1)

                  - AuditEntry1:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(245, 245, 247, 1)
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        PaddingTop: =8
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        RadiusTopLeft: =4
                        RadiusTopRight: =4
                        RadiusBottomLeft: =4
                        RadiusBottomRight: =4
                      Children:
                        - Entry1Action:
                            Control: Text
                            Properties:
                              Text: ="Status changed to Active"
                              Size: =11
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)

                        - Entry1Time:
                            Control: Text
                            Properties:
                              Text: ="Today at 2:30 PM by admin@contoso.com"
                              Size: =10
                              FontWeight: =FontWeight.Normal
                              Color: =RGBA(102, 102, 102, 1)

                  - AuditEntry2:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(245, 245, 247, 1)
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        PaddingTop: =8
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        RadiusTopLeft: =4
                        RadiusTopRight: =4
                        RadiusBottomLeft: =4
                        RadiusBottomRight: =4
                      Children:
                        - Entry2Action:
                            Control: Text
                            Properties:
                              Text: ="AccessLevel updated to Administrative"
                              Size: =11
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(51, 51, 51, 1)

                        - Entry2Time:
                            Control: Text
                            Properties:
                              Text: ="Yesterday at 10:15 AM by admin@contoso.com"
                              Size: =10
                              FontWeight: =FontWeight.Normal
                              Color: =RGBA(102, 102, 102, 1)

            - ActionButtonBar:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =Transparent
                  FillPortions: =0
                  Height: =50
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =12
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                Children:
                  - SaveButton:
                      Control: Button
                      Properties:
                        Text: ="Save Changes"
                        Fill: =RGBA(34, 177, 76, 1)
                        Color: =RGBA(255, 255, 255, 1)
                        BorderRadius: =4
                        FontWeight: =FontWeight.Semibold
                        OnSelect: =Notify("Changes saved successfully", NotificationType.Success)

                  - DeactivateButton:
                      Control: Button
                      Properties:
                        Text: ="Deactivate"
                        Fill: =RGBA(255, 193, 7, 1)
                        Color: =RGBA(51, 51, 51, 1)
                        BorderRadius: =4
                        FontWeight: =FontWeight.Semibold
                        OnSelect: =Notify("Entity deactivated", NotificationType.Information)

                  - DeleteButton:
                      Control: Button
                      Properties:
                        Text: ="Delete"
                        Fill: =RGBA(244, 67, 54, 1)
                        Color: =RGBA(255, 255, 255, 1)
                        BorderRadius: =4
                        FontWeight: =FontWeight.Semibold
                        OnSelect: =Notify("Confirm deletion in production", NotificationType.Warning)
